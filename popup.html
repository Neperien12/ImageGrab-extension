<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageGrab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
            <path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">ImageGrab</span>
      </div>
      <button class="btn-scan" id="scanBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Scanner
      </button>
    </header>

    <!-- Controls Bar -->
    <div class="controls" id="controlsBar" style="display:none">
      <div class="format-group">
        <label class="control-label">Format de sortie</label>
        <div class="format-pills">
          <button class="pill active" data-format="original">Original</button>
          <button class="pill" data-format="png">PNG</button>
          <button class="pill" data-format="jpeg">JPEG</button>
        </div>
      </div>
      <div class="quality-group" id="qualityGroup" style="display:none">
        <label class="control-label">Qualité JPEG — <span id="qualityVal">90</span>%</label>
        <input type="range" id="qualitySlider" min="10" max="100" value="90" class="slider">
      </div>
      <div class="filter-group">
        <label class="control-label">Taille min. (px)</label>
        <div class="size-filters">
          <button class="size-pill active" data-min="0">Tout</button>
          <button class="size-pill" data-min="100">100+</button>
          <button class="size-pill" data-min="300">300+</button>
          <button class="size-pill" data-min="500">500+</button>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar" style="display:none">
      <span class="stat">
        <span class="stat-num" id="totalCount">0</span> images
      </span>
      <span class="stat-sep">·</span>
      <span class="stat">
        <span class="stat-num" id="selectedCount">0</span> sélectionnées
      </span>
      <div class="stats-actions">
        <button class="link-btn" id="selectAllBtn">Tout sélect.</button>
        <span>·</span>
        <button class="link-btn" id="deselectAllBtn">Désélect.</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1" opacity="0.4"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" opacity="0.4"/>
          <path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </div>
      <p class="empty-title">Aucune image détectée</p>
      <p class="empty-sub">Cliquez sur <strong>Scanner</strong> pour analyser la page</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState" style="display:none">
      <div class="spinner"></div>
      <p>Analyse en cours…</p>
    </div>

    <!-- Image Grid -->
    <div class="image-grid" id="imageGrid"></div>

    <!-- Footer Actions -->
    <div class="footer" id="footer" style="display:none">
      <div class="footer-info" id="footerInfo"></div>
      <button class="btn-download" id="downloadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Télécharger
      </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
